<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CV - Palmas Street</title>
  <link rel="icon" type="image/png" href="/media/media-logos/Icono.png">

  <link rel="stylesheet" href="/css/css-web/us.css" />
  <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f7f7f7;
    }

    .cv-page {
      padding: 40px 20px;
      min-height: 100vh;
    }

    .cv-container {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .cv-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .cv-header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #383f3f;
    }

    .cv-header p {
      color: #555;
      font-weight: 600;
    }

    .cv-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .cv-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      border-radius: 34px;
      border: 2px solid transparent;
      background: #383f3f;
      color: #ffffff !important;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      box-shadow: 0 12px 24px rgba(56, 63, 63, 0.16);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .cv-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(56, 63, 63, 0.2);
    }

    .cv-btn.primary {
      background: #ff6b35;
      border-color: #ff6b35;
      color: #ffffff !important;
    }

    .cv-btn.primary:hover {
      background: #ff7e53;
      border-color: #ff7e53;
    }

    .cv-btn.secondary {
      background: #ffffff;
      color: #383f3f !important;
      border: 2px solid #383f3f;
    }

    .cv-viewer {
      width: 100%;
      height: 760px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #f1f1f1;
    }

    .cv-note {
      text-align: center;
      margin-top: 12px;
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .cv-viewer {
        height: 560px;
      }
    }
  </style>
</head>

<body>
  <main class="cv-page">
    <section class="cv-container">
      <div class="cv-header">
        <h1 id="cvTitle">CV del integrante</h1>
        <p id="cvInfo"></p>
      </div>

      <div class="cv-actions">
        <a id="viewCv" class="cv-btn primary" href="#" target="_blank" rel="noopener noreferrer">Ver CV</a>
        <a id="downloadCv" class="cv-btn" href="#" download>Descargar CV</a>
        <a class="cv-btn secondary" href="/web/us.html">Volver a Nosotros</a>
      </div>

      <iframe id="cvViewer" class="cv-viewer" title="CV en PDF"></iframe>

      
    </section>
  </main>

  <script src="/js/js-web/js-section/cv.js"></script>
</body>
</html>
