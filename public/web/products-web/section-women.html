<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección Damas | Palmas Street</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/css-web/css-sections/section-men.css" />
</head>
<body class="bg-light">

  <header class="header shadow-sm bg-white">
    <div class="container nav-container d-flex justify-content-between align-items-center py-3">
      <a href="/index.html">
        <img src="/media/media-logos/LogoPS.png" alt="Logo" style="height: 40px;">
      </a>
      <nav class="nav d-none d-lg-block">
        <ul class="nav-list d-flex gap-4 mb-0 list-unstyled">
          <li><a href="/index.html" class="text-dark text-decoration-none fw-semibold">Inicio</a></li>
          <li><a href="/web/products-web/section-men.html" class="text-dark text-decoration-none fw-semibold">Hombres</a></li>
          <li><a href="/web/us.html" class="text-dark text-decoration-none fw-semibold">Nosotros</a></li>
          <li><a href="/web/contact.html" class="text-dark text-decoration-none fw-semibold">Contacto</a></li>
        </ul>
      </nav>
      <div class="d-flex align-items-center gap-3">
        <a href="/web/cart.html" class="btn btn-outline-dark border-0 position-relative">
          <i class="bi bi-bag-heart fs-5"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </a>
        <button id="themeToggle" class="btn border-0">🌙</button>
      </div>
    </div>
  </header>

  <main class="container py-5" style="margin-top: 100px;">
    <div class="text-center mb-5">
      <h2 class="display-5 fw-bold" style="color: #d63384;">Colección Femenina</h2>
      <p class="text-muted italic">Elegancia urbana y estilo propio.</p>
    </div>

    <div class="d-flex justify-content-center mb-5">
      <div class="search-wrapper w-100" style="max-width: 600px; position: relative;">
        <i class="bi bi-search position-absolute" style="left: 20px; top: 50%; transform: translateY(-50%); color: #d63384;"></i>
        <input type="text" id="searchInput" class="form-control rounded-pill shadow-sm" style="padding: 15px 15px 15px 55px; border: 1px solid #f8bbd0;" placeholder="¿Qué buscas hoy, reina?">
      </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4" id="productsGrid">
      <div class="col-12 text-center py-5" id="loader">
        <div class="spinner-border text-danger" role="status"></div>
        <p class="mt-2 text-muted">Cargando catálogo...</p>
      </div>
    </div>
  </main>

  <footer class="footer mt-5">
    <div class="container text-center py-4">
      <p class="mb-0 text-muted">© 2026 Palmas Street. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/index.js"></script>
  <script src="/js/js-web/js-section/section-women.js"></script>
</body>
</html>
