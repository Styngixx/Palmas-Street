<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Palmas Street</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/css-web/admin.css">
</head>
<body class="admin-login-body">
    <div class="admin-login-wrapper">
        <div class="admin-login-card shadow-lg">
            <div class="text-center mb-4">
                <img src="/media/media-logos/LogoPS.png" alt="Palmas Street" class="admin-logo mb-3">
                <h1 class="h3 fw-bold">Panel Administrador</h1>
                <p class="text-muted mb-0">Gestión completa de productos</p>
            </div>

            <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" required placeholder="admin@palmastreet.com">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold py-2" id="btnLogin">
                    <span class="btn-text">Iniciar sesión</span>
                    <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="/index.html" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Volver a la tienda
                </a>
            </div>
        </div>
    </div>

    <script src="/js/js-web/admin/admin-auth.js"></script>
</body>
</html>
