<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Palmas Street</title>
    <link rel="icon" type="image/png" href="/media/media-logos/Icono.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body style="background-color: #f8f9fa; font-family: sans-serif;">

<div class="container" style="max-width: 450px; margin: 80px auto;">
    <div class="card p-4" style="border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <div class="text-center mb-4">
            <img src="/media/media-logos/LogoPS.png" alt="Palmas Street" height="50">
            <h3 class="fw-bold mt-3">Crear cuenta</h3>
            <p class="text-muted">Únete a la esencia urbana</p>
        </div>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100" style="background: #1a1a1a; border-radius: 8px; padding: 10px; font-weight: bold;">Registrarse</button>
            <div class="text-center mt-3">
                <a href="/web/admin/login.html" class="text-decoration-none text-dark small">¿Ya tienes cuenta? Ingresa aquí</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('¡Registro exitoso! Palmas Street te da la bienvenida.');
        window.location.href = '/';
    });
</script>
</body>
</html>
